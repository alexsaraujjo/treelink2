<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alex Souza Araújo</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background-color: #0b1d3a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    .profile-img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      border: 3px solid white;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .profession {
      font-size: 1rem;
      margin-bottom: 10px;
      opacity: 0.9;
    }

    .bio {
      font-size: 0.9rem;
      margin-bottom: 25px;
      opacity: 0.8;
    }

    .link {
      display: block;
      text-decoration: none;
      color: white;
      background: #1f3b73;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      transition: all 0.3s ease;
      font-weight: 500;
    }

    .link:hover {
      background: #2e5bbf;
      transform: translateY(-3px);
    }

  </style>
</head>
<body>
  <div class="container">
    <img src="https://via.placeholder.com/150" alt="Foto de perfil" class="profile-img">

    <h1>Alex Souza Araújo</h1>
    <p class="profession">Estudante de ADS | Futuro Desenvolvedor Full Stack</p>
    <p class="bio">Apaixonado por tecnologia, desenvolvimento web e torcedor do Fortaleza Esporte Clube.</p>

    <a href="https://instagram.com/alexsaraujjo" target="_blank" class="link">Instagram</a>
    <a href="https://www.linkedin.com/in/alex-souza-araújo-130337247/" target="_blank" class="link">LinkedIn</a>
    <a href="https://github.com/alexsaraujjo" target="_blank" class="link">GitHub</a>
  </div>
</body>
</html>
