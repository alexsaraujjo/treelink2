<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alex Souza Araújo</title>

  <!-- Fontes -->
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #F8F9FA;
      font-family: 'Inter', sans-serif;
      color: #343A40;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 24px;
      text-align: center;
    }

    /* Header */
    .header {
      background-color: #1B4332;
      padding: 32px 24px;
      border-radius: 16px;
      margin-bottom: 24px;
    }

    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #74C69D;
      margin-bottom: 16px;
    }

    .name {
      font-family: 'Merriweather', serif;
      color: white;
      font-size: 22px;
      margin-bottom: 8px;
    }

    .profession {
      color: #74C69D;
      font-size: 14px;
    }

    /* Links */
    .links {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .link-btn {
      display: block;
      width: 100%;
      padding: 16px;
      text-decoration: none;
      border-radius: 10px;
      border: 2px solid #2D6A4F;
      color: #2D6A4F;
      font-weight: 500;
      transition: 0.3s;
      background-color: white;
    }

    .link-btn:hover {
      background-color: #2D6A4F;
      color: white;
    }

  </style>
</head>
<body>

  <div class="container">

    <div class="header">
      <!-- Substitua pela sua foto -->
      <img src="https://via.placeholder.com/150" alt="Foto de Alex" class="profile-img">

      <h1 class="name">Alex Souza Araújo</h1>
      <p class="profession">Estudante de Análise e Desenvolvimento de Sistemas</p>
    </div>

    <div class="links">
      <a href="https://www.instagram.com/alexsaraujjo" target="_blank" class="link-btn">
        Instagram
      </a>

      <a href="https://www.linkedin.com/in/alex-souza-araújo-130337247/" target="_blank" class="link-btn">
        LinkedIn
      </a>

      <a href="https://github.com/alexsouzaraujo" target="_blank" class="link-btn">
        GitHub
      </a>
    </div>

  </div>

</body>
</html>
